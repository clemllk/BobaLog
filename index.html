const SUPABASE_URL = "https://pjhrvzybehrvopagbdtb.supabase.co";

// ─────────────────────────────────────────────────────────────────────────────

const CAT_KEY      = "kittylog_cat";

const { createClient } = supabase;

const QUICK_OFFSETS = [
  { label:"Now",     minutes:0   },
  { label:"30m ago", minutes:30  },
  { label:"1h ago",  minutes:60  },
  { label:"1.5h ago",minutes:90  },
  { label:"2h ago",  minutes:120 },
  { label:"3h ago",  minutes:180 },
];

function fmt(d) {
  return new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).format(d);
}
function fmtDate(d) {
  const t=new Date(), y=new Date(t); y.setDate(y.getDate()-1);
  if (d.toDateString()===t.toDateString()) return "Today";
  if (d.toDateString()===y.toDateString()) return "Yesterday";
  return new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric"}).format(d);
}
function timeSince(d) {
  const s=Math.floor((new Date()-d)/1000);
  if (s<60) return "just now";
  const m=Math.floor(s/60); if (m<60) return `${m}m ago`;
  const h=Math.floor(m/60); if (h<24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}
function toLocal(d) {
  const x=new Date(d); x.setMinutes(x.getMinutes()-x.getTimezoneOffset());
  return x.toISOString().slice(0,16);
}
function groupByDate(evs) {
  const g={};
  evs.forEach(e=>{ const k=new Date(e.timestamp).toDateString(); if(!g[k])g[k]=[]; g[k].push(e); });
  return g;
}
function genCode() { return Math.random().toString(36).slice(2,8).toUpperCase(); }

function calcHealth(events) {
  const now=new Date();
  const oldest=events.length ? new Date(events[events.length-1].timestamp) : now;
  const daysOfData=Math.max(1,(now-oldest)/(1000*60*60*24));
  const mf=Math.min(1,daysOfData/7);
  const last7=events.filter(e=>e.type!=="litter"&&(now-new Date(e.timestamp))/(1000*60*60*24)<=7);
  const pc=last7.filter(e=>e.type==="poop").length;
  const pec=last7.filter(e=>e.type==="pee").length;
  const ipMin=Math.round(5*mf), ipMax=Math.round(16*mf);
  const ieMin=Math.round(8*mf), ieMax=Math.round(32*mf);
  let ps=0;
  if (pc>=ipMin&&pc<=ipMax) ps=50;
  else if (pc>0&&pc<=ipMax+4) ps=35;
  else if (pc>0) ps=18;
  let es=0;
  if (pec>=ieMin&&pec<=ieMax) es=50;
  else if (pec>0&&pec<=ieMax+6) es=35;
  else if (pec>0) es=18;
  const lp=events.find(e=>e.type==="poop");
  const le=events.find(e=>e.type==="pee");
  const hp=lp?(now-new Date(lp.timestamp))/(1000*60*60):999;
  const he=le?(now-new Date(le.timestamp))/(1000*60*60):999;
  let total=ps+es;
  if (daysOfData>=2&&(hp>48||he>24)) total=Math.min(total,45);
  if (events.filter(e=>e.type!=="litter").length===0) total=0;
  if (daysOfData<3&&events.filter(e=>e.type!=="litter").length>0) total=Math.max(total,50);
  let label,color,emoji,detail;
  if (total>=85)      { label="Excellent"; color="#22c55e"; emoji="😸"; detail="Perfect bathroom habits!"; }
  else if (total>=65) { label="Good";      color="#84cc16"; emoji="😺"; detail="Healthy & regular"; }
  else if (total>=45) { label="Fair";      color="#f59e0b"; emoji="🙀"; detail="Slightly off schedule"; }
  else if (total>=20) { label="Poor";      color="#ef4444"; emoji="😿"; detail="Needs attention"; }
  else if (total>0)   { label="Critical";  color="#dc2626"; emoji="🚨"; detail="See a vet soon!"; }
  else                { label="No Data";   color="#9e8c79"; emoji="🐱"; detail="Start logging to track health"; }
  return { score:total, label, color, emoji, detail, poopCount:pc, peeCount:pec,
           hrsPoop:hp, hrsPee:he, daysOfData, idealPoopMin:ipMin, idealPoopMax:ipMax,
           idealPeeMin:ieMin, idealPeeMax:ieMax };
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [events,   setEvents]   = useState([]);
  const [catName,  setCatName]  = useState(localStorage.getItem(CAT_KEY)||"");

  const [reminder, setReminder] = useState(null);
  const [tooltip,  setTooltip]  = useState(false);
  const [ticker,   setTicker]   = useState(0);

  const loadEvents = useCallback(async (room) => {
    const { data, error } = await db.from("events").select("*")
      .eq("room_code", room).order("timestamp",{ascending:false}).limit(500);
    if (error) { setStatus("error"); return; }
    setEvents(data||[]);
    setStatus("ok");
  }, []);

  useEffect(() => {
    const r=localStorage.getItem(ROOM_KEY);
    const u=localStorage.getItem(USERNAME_KEY);
    const c=localStorage.getItem(CAT_KEY);
    if (r&&u) { setRoomCode(r); setUsername(u); setCatName(c||"Cat"); setScreen("app"); loadEvents(r); }
    else if (r) { setRoomCode(r); setScreen("setup"); }
    else setScreen("room");
  }, [loadEvents]);

  useEffect(() => {
    if (!roomCode||screen!=="app") return;
    const ch = db.channel("rt-"+roomCode)
      .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>loadEvents(roomCode))
      .subscribe();
    return () => db.removeChannel(ch);
  }, [roomCode, screen, loadEvents]);

  useEffect(() => {
    const id=setInterval(()=>setTicker(t=>t+1),30000); return ()=>clearInterval(id);
  }, []);

  const joinRoom = (code) => {
    const rc=code.toUpperCase().trim(); if (!rc) return;
    localStorage.setItem(ROOM_KEY, rc); setRoomCode(rc); setScreen("setup");
  };

  const completeSetup = (u, c) => {
    localStorage.setItem(USERNAME_KEY, u); localStorage.setItem(CAT_KEY, c);
    setUsername(u); setCatName(c); setScreen("app");
    loadEvents(localStorage.getItem(ROOM_KEY));
  };

  const openForm   = (type) => setLogForm({type,note:"",customTime:toLocal(new Date()),useCustom:false,quickOffset:0});
  const applyOffset = (mins) => {
    const t=new Date(Date.now()-mins*60000);
    setLogForm(f=>({...f,quickOffset:mins,customTime:toLocal(t),useCustom:mins!==0}));
  };

  const addEvent = async () => {
    if (!logForm) return;
    const ts = logForm.useCustom ? new Date(logForm.customTime).toISOString() : new Date().toISOString();
    const ev = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
      type: logForm.type, timestamp: ts,
      logged_by: username, note: logForm.note.trim()||null,
      cat_name: catName, room_code: roomCode,
    };
    const { error } = await db.from("events").insert(ev);
    if (error) { alert("Save failed: "+error.message); return; }
    setPulse(logForm.type); setTimeout(()=>setPulse(null),600);
    if (logForm.type==="poop"||logForm.type==="pee") {
      setReminder({type:logForm.type}); setTimeout(()=>setReminder(null),6000);
    }
    setLogForm(null);
  };

  const deleteEvent = async (id) => {
    await db.from("events").delete().eq("id",id);
    setEvents(ev=>ev.filter(e=>e.id!==id));
  };

  const leaveRoom = () => {
    [ROOM_KEY,USERNAME_KEY,CAT_KEY].forEach(k=>localStorage.removeItem(k));
    setRoomCode(""); setUsername(""); setCatName(""); setEvents([]); setScreen("room");
  };

  const now   = new Date();
  const last7 = events.filter(e=>e.type!=="litter"&&(now-new Date(e.timestamp))/(1000*60*60*24)<=7);
  const stats = {
    lastPoop:   events.find(e=>e.type==="poop"),
    lastPee:    events.find(e=>e.type==="pee"),
    lastLitter: events.find(e=>e.type==="litter"),
    poops: last7.filter(e=>e.type==="poop").length,
    pees:  last7.filter(e=>e.type==="pee").length,
  };
  const health = calcHealth(events);

  if (screen==="loading") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:40}}>🐾</div>;
  if (screen==="room")    return <RoomScreen onJoin={joinRoom}/>;
  if (screen==="setup")   return <SetupScreen onDone={completeSetup} roomCode={roomCode}/>;

  return (
    <div style={S.app}>
      {/* Header */}
      <header style={S.header}>
        <div style={S.hInner}>
          <div style={S.hLeft}>
            <span style={{fontSize:24}}>🐾</span>
            <div>
              <div style={S.appName}>KittyLog</div>
              <div style={S.catLabel}>{catName} · Room {roomCode}</div>
            </div>
          </div>
          <div style={S.userChip}>
            <span style={{...S.dot, background:status==="ok"?"#7fff7f":status==="error"?"#ff6b6b":"#ffd700"}}/>
            {username}
          </div>
        </div>
      </header>

      {/* Reminder */}
      {reminder && (
        <div style={S.reminderBanner}>
          <span style={{fontSize:20}}>{reminder.type==="poop"?"🧻":"💧"}</span>
          <span style={S.reminderText}>
            {reminder.type==="poop"
              ? `Remember to check and clean ${catName}'s butt! 🐾`
              : `Remember to clean ${catName}'s pee pee area if needed! 💧`}
          </span>
          <button style={S.reminderClose} onClick={()=>setReminder(null)}>✕</button>
        </div>
      )}

      {/* Health Meter */}
      <HealthMeter health={health} catName={catName} tooltip={tooltip} setTooltip={setTooltip}/>

      {/* Status Banner */}
      <div style={S.banner}>
        <SItem emoji="💩" label="Last poop"  value={stats.lastPoop   ? timeSince(new Date(stats.lastPoop.timestamp))   : "None"} urgent={stats.lastPoop   && (now-new Date(stats.lastPoop.timestamp))>1000*60*60*36}/>
        <div style={S.div}/>
        <SItem emoji="💧" label="Last pee"   value={stats.lastPee    ? timeSince(new Date(stats.lastPee.timestamp))    : "None"} urgent={stats.lastPee    && (now-new Date(stats.lastPee.timestamp))>1000*60*60*18}/>
        <div style={S.div}/>
        <SItem emoji="🪣" label="Last clean" value={stats.lastLitter ? timeSince(new Date(stats.lastLitter.timestamp)) : "None"} urgent={stats.lastLitter && (now-new Date(stats.lastLitter.timestamp))>1000*60*60*72}/>
      </div>

      {/* Log Buttons */}
      <div style={S.logSec}>
        <p style={S.prompt}>What did {catName} do?</p>
        <div style={S.btnRow}>
          <button style={{...S.logBtn,...S.poopBtn, transform:pulse==="poop"?"scale(.93)":"scale(1)"}} onClick={()=>openForm("poop")}>

          </button>
          <button style={{...S.logBtn,...S.litBtn,  transform:pulse==="litter"?"scale(.93)":"scale(1)"}} onClick={()=>openForm("litter")}>
            <span style={{fontSize:30}}>🪣</span><span style={S.btnLbl}>Cleaned Litter</span>
          </button>
        </div>
      </div>

      {/* Log Form Modal */}
      {logForm && (
        <div style={S.backdrop} onClick={()=>setLogForm(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.modalTitle}>
              {logForm.type==="poop"?"💩 Log Poop":logForm.type==="pee"?"💧 Log Pee":"🪣 Log Litter Clean"}
            </div>
            {logForm.type==="litter" && <div style={S.litNote}>Records a full kitty litter removal & clean.</div>}
            <div style={S.fSec}>
              <label style={S.lbl}>Quick time</label>
              <div style={S.quickRow}>
                {QUICK_OFFSETS.map(o=>(
                  <button key={o.minutes}
                    style={{...S.qBtn,...(logForm.quickOffset===o.minutes?S.qBtnOn:{})}}
                    onClick={()=>applyOffset(o.minutes)}>{o.label}</button>
                ))}
              </div>
            </div>
            <div style={S.fSec}>
              <label style={S.lbl}>Custom time</label>
              <input type="datetime-local" style={S.input} value={logForm.customTime}
                onChange={e=>setLogForm(f=>({...f,customTime:e.target.value,useCustom:true,quickOffset:-1}))}/>
            </div>
            <div style={S.fSec}>
              <label style={S.lbl}>Note (optional)</label>
              <input style={S.input}
                placeholder={logForm.type==="litter"?'"changed sand", "deep clean"…':'"solid","runny","outside box"…'}
                value={logForm.note} onChange={e=>setLogForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div style={S.mBtns}>
              <button style={S.cancelBtn} onClick={()=>setLogForm(null)}>Cancel</button>
              <button style={S.confirmBtn} onClick={addEvent}>
                Log {logForm.type==="poop"?"💩":logForm.type==="pee"?"💧":"🪣"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Health Tooltip Modal */}
      {tooltip && (
        <div style={S.backdrop} onClick={()=>setTooltip(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.modalTitle}>📊 How the health score works</div>
            <div style={{fontSize:13,color:"#4a3728",lineHeight:1.8}}>
              <p>The score is out of <b>100</b> based on two factors:</p><br/>
              <p>💩 <b>Poop regularity</b> (50 pts) — Ideal: 1–2× per day</p><br/>
              <p>💧 <b>Pee regularity</b> (50 pts) — Ideal: 2–4× per day</p><br/>
              <div style={{background:"#fff8f0",borderRadius:10,padding:"10px 12px",border:"1px solid #f0e6d3"}}>
                <p>⏳ <b>New user adjustment</b></p>
                <p style={{marginTop:4}}>If you've logged less than 7 days of data, the score adjusts automatically so your cat isn't penalized for limited history. It gets more accurate over time.</p>
              </div><br/>
              <p>⚠️ A lower score only reflects the <b>logging pattern</b> — not necessarily that your cat is unwell. Always consult a vet if concerned.</p>
            </div>
            <button style={{...S.confirmBtn,marginTop:16}} onClick={()=>setTooltip(false)}>Got it!</button>
          </div>
        </div>
      )}

      {/* Nav */}
      <div style={S.nav}>
        {[["log","📋 Log"],["calendar","📅 Cal"],["stats","📊 Stats"],["settings","⚙️"]].map(([v,l])=>(
          <button key={v} style={{...S.navBtn,...(view===v?S.navOn:{})}} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>

      {/* Views */}
      <div style={S.content}>
        {view==="log"      && <LogView      events={events} onDelete={deleteEvent} catName={catName}/>}
        {view==="calendar" && <CalView      events={events}/>}
        {view==="stats"    && <StatsView    events={events} catName={catName} health={health}/>}
        {view==="settings" && <SettingsView catName={catName} username={username} roomCode={roomCode}

          onLeave={leaveRoom}/>}
      </div>
    </div>
  );
}

        <span style={{color:"#f59e0b",fontSize:10}}>Fair</span>
        <span style={{color:"#84cc16",fontSize:10}}>Good</span>
        <span style={{color:"#22c55e",fontSize:10}}>Excellent</span>
      </div>
    </div>
  );
}

// ─── Leaderboards ─────────────────────────────────────────────────────────────
function PoopLeaderboard({ events }) {
  const poops=events.filter(e=>e.type==="poop");
  const counts={}; poops.forEach(e=>{ const u=e.logged_by||e.loggedBy; counts[u]=(counts[u]||0)+1; });
  const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=poops.length;
  const medals=["🥇","🥈","🥉"];
  if (!ranked.length) return <div style={S.tip}><p style={{textAlign:"center",color:"#9e8c79"}}>No poop logs yet!</p></div>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {ranked.map(([user,count],i)=>{
        const pct=total>0?Math.round((count/total)*100):0;
        const isFirst=i===0;
        return (
          <div key={user} style={{...S.lbRow,...(isFirst?S.lbFirst:{})}}>

            <div style={{flex:1}}>

                {isFirst && <span style={S.lbCrown}>👑 Poop Champ</span>}
              </div>
              <div style={S.lbBarTrack}>
                <div style={{...S.lbBarFill,width:`${pct}%`,
                  background:i===0?"linear-gradient(90deg,#ff9a3c,#ff6b6b)":

                                   "linear-gradient(90deg,#d97706,#b45309)"}}/>
              </div>
            </div>
            <div style={{textAlign:"center",minWidth:58}}>

              <span style={{fontSize:10,color:"#9e8c79"}}>💩 cleaned</span>
            </div>

        );

      <div style={{textAlign:"center",fontSize:13,color:"#9e8c79",paddingTop:8,borderTop:"1px solid #f0e6d3"}}>Total: <b>{total}</b> 💩</div>
    </div>
  );
}

function LitterLeaderboard({ events }) {
  const litters=events.filter(e=>e.type==="litter");
  const counts={}; litters.forEach(e=>{ const u=e.logged_by||e.loggedBy; counts[u]=(counts[u]||0)+1; });
  const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=litters.length;
  const medals=["🥇","🥈","🥉"];
  if (!ranked.length) return <div style={S.tip}><p style={{textAlign:"center",color:"#9e8c79"}}>No litter cleans yet!</p></div>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {ranked.map(([user,count],i)=>{
        const pct=total>0?Math.round((count/total)*100):0;
        const isFirst=i===0;
        return (
          <div key={user} style={{...S.lbRow,...(isFirst?{...S.lbFirst,borderColor:"#6366f1"}:{})}}>
            <div style={{width:34,textAlign:"center"}}><span style={{fontSize:isFirst?26:18}}>{medals[i]||`#${i+1}`}</span></div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:isFirst?16:14,fontWeight:"bold",color:"#2d1f14"}}>{user}</span>
                {isFirst && <span style={{...S.lbCrown,color:"#6366f1",background:"#f0f4ff"}}>🏆 Litter Hero</span>}
              </div>
              <div style={S.lbBarTrack}>
                <div style={{...S.lbBarFill,width:`${pct}%`,
                  background:i===0?"linear-gradient(90deg,#6366f1,#8b5cf6)":
                             i===1?"linear-gradient(90deg,#94a3b8,#64748b)":
                                   "linear-gradient(90deg,#d97706,#b45309)"}}/>
              </div>
            </div>
            <div style={{textAlign:"center",minWidth:58}}>
              <span style={{display:"block",fontSize:20,fontWeight:"bold",color:"#6366f1",lineHeight:1}}>{count}</span>
              <span style={{fontSize:10,color:"#9e8c79"}}>🪣 cleans</span>
            </div>
          </div>
        );
      })}
      <div style={{textAlign:"center",fontSize:13,color:"#9e8c79",paddingTop:8,borderTop:"1px solid #f0e6d3"}}>Total: <b>{total}</b> 🪣</div>
    </div>
  );
}

// ─── Log View ─────────────────────────────────────────────────────────────────
function LogView({ events, onDelete, catName }) {
  const grouped=groupByDate(events);
  const keys=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
  if (!keys.length) return <div style={S.empty}><div style={{fontSize:48}}>🐱</div><p>No events yet!<br/>Tap a button when {catName} goes.</p></div>;
  return (
    <div>
      {keys.map(k=>(
        <div key={k}>
          <div style={S.dateHdr}>{fmtDate(new Date(k))}</div>
          {grouped[k].map(ev=><EventRow key={ev.id} event={ev} onDelete={onDelete}/>)}
        </div>
      ))}
    </div>
  );
}

function EventRow({ event, onDelete }) {
  const [confirm,setConfirm]=useState(false);
  const icon  = event.type==="poop"?"💩":event.type==="pee"?"💧":"🪣";
  const label = event.type==="poop"?"Pooped":event.type==="pee"?"Peed":"Cleaned Litter";
  const who   = event.logged_by||event.loggedBy;
  return (
    <div style={S.eRow}>
      <div style={{fontSize:22,width:30,textAlign:"center"}}>{icon}</div>
      <div style={{flex:1}}>
        <div style={S.eType}>{label}{event.note&&<span style={S.eNote}> · {event.note}</span>}</div>
        <div style={S.eMeta}>{fmt(new Date(event.timestamp))} · {who}</div>
      </div>
      {confirm
        ? <><button style={S.delY} onClick={()=>onDelete(event.id)}>Yes</button><button style={S.delN} onClick={()=>setConfirm(false)}>No</button></>
        : <button style={S.delBtn} onClick={()=>setConfirm(true)}>✕</button>}
    </div>
  );
}

// ─── Calendar ─────────────────────────────────────────────────────────────────
function CalView({ events }) {
  const now=new Date();
  const [cur,setCur]=useState({y:now.getFullYear(),m:now.getMonth()});
  const [sel,setSel]=useState(null);
  const {y,m}=cur;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthLabel=new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(new Date(y,m));
  const map={};
  events.forEach(e=>{
    const d=new Date(e.timestamp);
    if (d.getFullYear()===y&&d.getMonth()===m) {
      const k=d.getDate();
      if (!map[k]) map[k]={poop:0,pee:0,litter:0,evs:[]};
      map[k][e.type]++; map[k].evs.push(e);
    }
  });
  const cells=[];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);
  const selEvs=sel&&map[sel]?map[sel].evs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)):[];
  return (
    <div style={{padding:16}}>
      <div style={S.calNav}>
        <button style={S.calNBtn} onClick={()=>setCur(c=>{ const nm=c.m===0?11:c.m-1; return{y:c.m===0?c.y-1:c.y,m:nm}; })}>‹</button>
        <span style={S.calMonth}>{monthLabel}</span>
        <button style={S.calNBtn} onClick={()=>setCur(c=>{ const nm=c.m===11?0:c.m+1; return{y:c.m===11?c.y+1:c.y,m:nm}; })}>›</button>
      </div>
      <div style={S.calGrid}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={S.calDH}>{d}</div>)}
        {cells.map((day,i)=>{
          if (!day) return <div key={`e${i}`}/>;
          const info=map[day];
          const isToday=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===day;
          return (
            <div key={day}
              style={{...S.calCell,...(isToday?S.calToday:{}),...(sel===day?S.calSel:{})}}
              onClick={()=>setSel(sel===day?null:day)}>
              <span style={S.calDN}>{day}</span>
              {info && (
                <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>
                  {info.poop>0   && <span style={S.dPoop}>{info.poop>1?info.poop:""}</span>}
                  {info.pee>0    && <span style={S.dPee}>{info.pee>1?info.pee:""}</span>}
                  {info.litter>0 && <span style={S.dLitter}>{info.litter>1?info.litter:""}</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,justifyContent:"center",flexWrap:"wrap"}}>
        <span style={S.dPoop}/><span style={{fontSize:11,color:"#6b5344"}}>Poop</span>
        <span style={{...S.dPee,marginLeft:8}}/><span style={{fontSize:11,color:"#6b5344"}}>Pee</span>
        <span style={{...S.dLitter,marginLeft:8}}/><span style={{fontSize:11,color:"#6b5344"}}>Litter</span>
      </div>
      {sel && (
        <div style={{marginTop:14,background:"#fff",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          <div style={{fontWeight:"bold",fontSize:16,color:"#2d1f14",marginBottom:10}}>
            {new Intl.DateTimeFormat("en-US",{month:"long",day:"numeric"}).format(new Date(y,m,sel))}
          </div>
          {selEvs.length===0
            ? <p style={{color:"#9e8c79",fontSize:13}}>No events.</p>
            : selEvs.map(ev=>(
                <div key={ev.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #faf0e4"}}>
                  <span style={{fontSize:16}}>{ev.type==="poop"?"💩":ev.type==="pee"?"💧":"🪣"}</span>
                  <span style={{fontSize:13,color:"#2d1f14",marginLeft:8}}>{fmt(new Date(ev.timestamp))}</span>
                  {ev.note && <span style={{color:"#9e8c79",fontStyle:"italic",fontSize:12,marginLeft:6}}>{ev.note}</span>}
                  <span style={{fontSize:11,color:"#b0a090",marginLeft:"auto"}}>by {ev.logged_by||ev.loggedBy}</span>
                </div>
              ))}
        </div>
      )}
    </div>
  );
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function StatsView({ events, catName, health }) {
  const now=new Date();
  const cnt=(days,type)=>events.filter(e=>e.type===type&&(now-new Date(e.timestamp))/(1000*60*60*24)<=days).length;
  const avg=(type)=>{
    const t=events.filter(e=>e.type===type);
    if (t.length<2) return t.length;
    const old=new Date(t[t.length-1].timestamp);
    return (t.length/Math.max(1,(now-old)/(1000*60*60*24))).toFixed(1);
  };
  return (
    <div style={{padding:20}}>
      <h2 style={S.statsTitle}>{catName}'s Overview</h2>
      <div style={S.sGrid}>
        {[["💩","Poops (7d)",cnt(7,"poop")],["💧","Pees (7d)",cnt(7,"pee")],
          ["💩","Avg/day",avg("poop")],    ["💧","Avg/day",avg("pee")]].map(([e,l,v])=>(
          <div key={l} style={S.sCard}>
            <div style={{fontSize:26}}>{e}</div>
            <div style={S.sVal}>{v}</div>
            <div style={S.sLbl}>{l}</div>
          </div>
        ))}
      </div>

      <div style={S.secTitle}>Health Breakdown</div>
      <div style={S.tip}>
        {[
          {label:"Poop frequency", value:health.poopCount, ideal:`${health.idealPoopMin}–${health.idealPoopMax} this period`, ok:health.poopCount>=health.idealPoopMin&&health.poopCount<=health.idealPoopMax},
          {label:"Pee frequency",  value:health.peeCount,  ideal:`${health.idealPeeMin}–${health.idealPeeMax} this period`,  ok:health.peeCount>=health.idealPeeMin&&health.peeCount<=health.idealPeeMax},
          {label:"Last poop", value:health.hrsPoop<999?`${Math.round(health.hrsPoop)}h ago`:"No data", ideal:"Within 48h", ok:health.hrsPoop<48},
          {label:"Last pee",  value:health.hrsPee<999?`${Math.round(health.hrsPee)}h ago`:"No data",  ideal:"Within 24h", ok:health.hrsPee<24},
        ].map(r=>(
          <div key={r.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f0e6d3"}}>
            <div>
              <div style={{fontSize:13,fontWeight:"bold",color:"#2d1f14"}}>{r.label}</div>
              <div style={{fontSize:11,color:"#9e8c79"}}>Ideal: {r.ideal}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,fontWeight:"bold",color:"#2d1f14"}}>{r.value}</span>
              <span style={{fontSize:15}}>{r.ok?"✅":"⚠️"}</span>
            </div>
          </div>
        ))}
      </div>

      <div style={S.secTitle}>💩 Poop Cleaner Rankings</div>
      <PoopLeaderboard events={events}/>
      <div style={S.secTitle}>🪣 Litter Cleaner Rankings</div>
      <LitterLeaderboard events={events}/>
    </div>
  );
}
